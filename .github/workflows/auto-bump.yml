name: Auto bump patch version

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  bump-patch-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Bump patch version
        run: |
          current=$(tr -d '[:space:]' < VERSION)
          if ! [[ "$current" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid VERSION format: $current" >&2
            exit 1
          fi
          IFS='.' read -r major minor patch <<< "$current"
          patch=$((patch + 1))
          new="${major}.${minor}.${patch}"
          echo "$new" > VERSION
          echo "Bumped: $current -> $new"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          # Guard against no-op commits (e.g. VERSION unchanged)
          if git diff --cached --quiet; then
            echo "No VERSION change to commit"
            exit 0
          fi
          # [skip ci] prevents recursive auto-bump runs on main
          git commit -m "chore: bump patch version to $(cat VERSION) [skip ci]"
          # Rebase in case main moved (concurrent merges)
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "push failed, retrying ($i)"
            sleep 2
          done
          exit 1
